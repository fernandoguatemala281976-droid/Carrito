<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>4WD Global Control - UAGro</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { background: #0f0f13; color: #00d4ff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        /* CONTENEDOR DE VIDEO NEÓN */
        .video-container { 
            width: 100%; 
            max-width: 500px; 
            aspect-ratio: 4/3; 
            background: #000; 
            border: 2px solid #00d4ff; 
            border-radius: 20px; 
            margin-bottom: 20px; 
            overflow: hidden; 
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
            cursor: pointer;
        }
        .video-container img { width: 100%; height: 100%; object-fit: cover; }

        .panel { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 50px; border: 1px solid #00d4ff; box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        .grid { display: grid; grid-template-columns: repeat(3, 90px); grid-template-rows: repeat(3, 90px); gap: 15px; }
        button { background: #1a1a24; border: 2px solid #00d4ff; color: white; font-size: 35px; border-radius: 25px; cursor: pointer; transition: 0.2s; touch-action: none; }
        button:active { background: #00d4ff; color: #000; box-shadow: 0 0 40px #00d4ff; transform: scale(0.9); }
        
        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .stop { grid-column: 2; grid-row: 2; border-color: #ff4b2b; color: #ff4b2b; font-size: 20px; }
        .right { grid-column: 3; grid-row: 2; }
        .down { grid-column: 2; grid-row: 3; }
        
        #status { margin-top: 20px; font-size: 14px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="text-shadow: 0 0 10px #00d4ff;">CARRO_FERNANDO</h1>

    <div class="video-container" onclick="location.reload();">
        <div class="video-container">
    <iframe src="https://brunilda-viable-nenita.ngrok-free.dev/video" style="width:100%; height:100%; border:none;" scrolling="no"></iframe>
</div>
    </div>

    <div class="panel">
        <div class="grid">
            <button class="up" onmousedown="pub('F')" onmouseup="pub('S')" ontouchstart="pub('F')" ontouchend="pub('S')">▲</button>
            <button class="left" onmousedown="pub('L')" onmouseup="pub('S')" ontouchstart="pub('L')" ontouchend="pub('S')">◀</button>
            <button class="stop" onclick="pub('S')">STOP</button>
            <button class="right" onmousedown="pub('R')" onmouseup="pub('S')" ontouchstart="pub('R')" ontouchend="pub('S')">▶</button>
            <button class="down" onmousedown="pub('B')" onmouseup="pub('S')" ontouchstart="pub('B')" ontouchend="pub('S')">▼</button>
        </div>
    </div>

    <div id="status">MQTT: Conectando...</div>

    <script>
        const topic = "uagro/ferna/carro/control";
        const client = mqtt.connect('ws://broker.hivemq.com:8884/mqtt');

        client.on('connect', () => {
            document.getElementById('status').innerText = "SISTEMA ONLINE ✔";
            document.getElementById('status').style.color = "#00ff00";
        });

        function pub(msg) {
            client.publish(topic, msg);
            console.log("Comando enviado: " + msg);
        }

        // Bloquea el zoom molesto al presionar rápido en móvil
        document.addEventListener('touchstart', (e) => {
            if (e.target.tagName === 'BUTTON') e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
